<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Meet Caption Saver</title>
  <style>
    body{font-family: Arial, sans-serif; width:320px; padding:10px}
    button{margin:4px 0; width:100%}
    textarea{width:100%;height:160px}
    .row{display:flex; gap:6px}
    .row button{flex:1}
  </style>
</head>
<body>
  <h3>Meet Caption Saver</h3>
  <div>
    <button id="toggle">Start capturing</button>
    <div class="row">
      <button id="download">Download .txt</button>
      <button id="clear">Clear</button>
    </div>
    <p><small>Captions captured while "Start capturing" is ON.</small></p>
    <textarea id="preview" readonly placeholder="Captured captions will appear here..."></textarea>
  </div>
  <script src="popup.js"></script>
</body>
</html>
